{% extends 'base.html' %}

{% block breadcrumbs %}
<a href="{{ url_for('home') }}">Home</a>
<span>/</span>
<a href="{{ url_for('admin_portal') }}">System Administration</a>
<span>/</span>
<a>Edit Volume</a>
{% endblock %}

{% block intro %}{% endblock %}
{% block search_bar %}{% endblock %}

{% block content %}
<div class="archive-details-header">
    <span class="archive-details-subtitle">Repository Maintenance</span>
    <h2>Edit {{ volume.volume_number }}</h2>
</div>

<div style="background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 6px; margin-bottom: 40px;">
    <form action="{{ url_for('admin_update_volume', volume_id=volume.id) }}" method="post" style="display: flex; flex-direction: column; gap: 15px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label style="display: block; font-family: sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Volume Title/Identifier</label>
                <input type="text" name="volume_number" value="{{ volume.volume_number }}" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper); color: var(--ink);">
            </div>
            <div>
                <label style="display: block; font-family: sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Year of Publication</label>
                <input type="text" name="year" value="{{ volume.year }}" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper); color: var(--ink);">
            </div>
        </div>
        <div>
            <label style="display: block; font-family: sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Academic Discipline / Subject</label>
            <input type="text" name="subject" value="{{ volume.subject }}" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper); color: var(--ink);">
        </div>
        <div>
            <label style="display: block; font-family: sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Thematic Title</label>
            <input type="text" name="title" value="{{ volume.title }}" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper); color: var(--ink);">
        </div>
        <div>
            <label style="display: block; font-family: sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Scope & Description</label>
            <textarea name="desc" required style="width: 100%; min-height: 100px; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper); color: var(--ink); font-family: inherit; outline: none;">{{ volume.desc }}</textarea>
        </div>
        <div style="display: flex; gap: 15px;">
            <button type="submit" class="btn-submit" style="width: auto; padding: 12px 30px;">Save Changes</button>
            <a href="{{ url_for('admin_portal') }}" class="btn-link" style="padding: 12px 20px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
