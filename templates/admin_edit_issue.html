{% extends 'base.html' %}

{% block breadcrumbs %}
<a href="{{ url_for('home') }}">Home</a>
<span>/</span>
<a href="{{ url_for('admin_portal') }}">System Administration</a>
<span>/</span>
<a>Edit Issue</a>
{% endblock %}

{% block intro %}{% endblock %}
{% block search_bar %}{% endblock %}

{% block content %}
<div class="archive-details-header">
    <span class="archive-details-subtitle">Repository Maintenance</span>
    <h2>Edit {{ issue.issue_number }}</h2>
</div>

<div style="background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 6px; margin-bottom: 40px;">
    <form action="{{ url_for('admin_update_issue', issue_id=issue.id) }}" method="post" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="display: block; font-family: sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Parent Volume Delegation</label>
            <select name="volume_id" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper); color: var(--ink); outline: none;">
                {% for vol in volumes %}
                <option value="{{ vol.id }}" {% if vol.id == issue.volume_id %}selected{% endif %}>{{ vol.volume_number }} ({{ vol.subject }})</option>
                {% endfor %}
            </select>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label style="display: block; font-family: sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Issue Number</label>
                <input type="text" name="issue_number" value="{{ issue.issue_number }}" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper); color: var(--ink);">
            </div>
            <div>
                <label style="display: block; font-family: sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Date Assigned</label>
                <input type="text" name="date" value="{{ issue.date }}" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper); color: var(--ink);">
            </div>
        </div>
        <div>
            <label style="display: block; font-family: sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;">Issue Focus Title</label>
            <input type="text" name="title" value="{{ issue.title }}" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper); color: var(--ink);">
        </div>
        <div style="display: flex; gap: 15px;">
            <button type="submit" class="btn-submit" style="width: auto; padding: 12px 30px;">Save Changes</button>
            <a href="{{ url_for('admin_portal') }}" class="btn-link" style="padding: 12px 20px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
